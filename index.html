<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Das Grune - Digitize Ideas</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
  <header class="header">
    <div class="logo">Das Grune</div>
    <nav class="nav">
      <a href="#about">ABOUT</a>
      <a href="lineup.html">PROJECTS</a>
      <a href="#services">SERVICES</a>
      <a href="acessibilidade.html">LET'S TALK</a>
    </nav>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </header>

  <main class="main-content">
    <section class="left-side">
      <h1 class="main-title">DIGITIZE<br>IDEAS</h1>
      <div class="badges">
        <div class="badge">2022 Best Agency</div>
        <div class="badge">World Class Agency</div>
      </div>
    </section>

    <section class="right-side">
      <!-- Vinil -->
      <div class="vinyl-container">
        <div class="vinyl-grooves"></div>
        <div class="vinyl-center">
          <img id="trackImage" src="https://i1.sndcdn.com/artworks-000000000000-0-t500x500.jpg" alt="Track Cover">
        </div>
        <div class="vinyl-hole"></div>
      </div>

      <!-- Controles fora -->
      <div class="music-controls">
        <button id="prev" title="Previous"><i class="fas fa-backward"></i></button>
        <button id="play" title="Play/Pause"><i class="fas fa-play" id="playIcon"></i></button>
        <button id="next" title="Next"><i class="fas fa-forward"></i></button>
        <div class="volume-control">
          <i class="fas fa-volume-down" style="font-size: 12px; color: #666;"></i>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="80">
          <i class="fas fa-volume-up" style="font-size: 12px; color: #666;"></i>
        </div>
      </div>

      <!-- Info -->
      <div class="music-info">
        <div class="track-name" id="trackName">Mellow Sunrise</div>
        <div class="artist-name" id="artistName">Forss</div>
        <div class="description" id="trackDescription">Smooth electronic vibes that transport you to another dimension.
        </div>
      </div>
    </section>
  </main>

  <!-- Arrow circle link -->
  <a href="https://pt.wikipedia.org/wiki/Wikip%C3%A9dia" target="_blank" class="arrow-circle"></a>

  <section class="bottom-strip">
    <div class="scrolling-text">
      VENHA FUDER SUA VIDA — VENHA FUDER SUA VIDA — VENHA FUDER SUA VIDA —
    </div>
  </section>

  <iframe id="sc-player" width="0" height="0" frameborder="no" allow="autoplay" style="display: none;"
    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293&auto_play=false">
  </iframe>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://w.soundcloud.com/player/api.js"></script>
  <script src="script.js"></script>
</body>

</html>
